# Lobbie (LGTM Lobster) — Configuration
# Copy this file to config.yaml and fill in your values.
# config.yaml is gitignored — never commit it.

github:
  # Your GitHub username
  username: ""
  # Organization to monitor
  org: ""
  # Repos to watch (list)
  repos:
    - "repo-name"
  # Personal access token (needs: repo, read:org scopes)
  # Generate at: https://github.com/settings/tokens
  token: ""

# Team — PRs from these users are "team PRs"
# Use github_team to pull membership automatically via the GitHub API,
# or list individual usernames in members (or both).
team:
  github_team: "org/team-slug"
  # members:
  #   - "extra-collaborator"

# How often to poll for updates (in minutes)
poll_interval: 5

# Jira integration
jira:
  # Your Atlassian instance URL
  base_url: "https://your-company.atlassian.net"
  # Jira account email
  email: ""
  # API token — generate at: https://id.atlassian.com/manage-profile/security/api-tokens
  api_token: ""
  # Project keys to monitor
  project_keys:
    - ""
